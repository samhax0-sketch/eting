# ============================================================
#  Leapcell deployment manifest
#  Project: ETING — Edukasi Interaktif Tenun & Hukum
# ============================================================
# Docs: https://docs.leapcell.io
#
# File ini opsional — kebanyakan setting bisa diisi via dashboard
# Leapcell, tapi commit-in supaya konfigurasi terlacak di git.

# -----------------------------------------------------------
#  Service identity
# -----------------------------------------------------------
name        = "eting-backend"
description = "FastAPI server untuk halaman edukasi anti-judol ETING (SMK Negeri 18 Samarinda)."

# -----------------------------------------------------------
#  Runtime
# -----------------------------------------------------------
[runtime]
type    = "python"
version = "3.11"

# -----------------------------------------------------------
#  Build phase
# -----------------------------------------------------------
[build]
# Leapcell otomatis deteksi requirements.txt, tapi kita eksplisit
# supaya tidak ambigu kalau ada file lain.
command = "pip install --no-cache-dir -r requirements.txt"

# -----------------------------------------------------------
#  Run phase
# -----------------------------------------------------------
[run]
# $PORT diisi otomatis oleh Leapcell.
#
# Pakai gunicorn + UvicornWorker karena:
#   1. Default template Leapcell jalankan `gunicorn ... your_app.wsgi`
#      jadi binary `gunicorn` HARUS ada di environment.
#   2. UvicornWorker = ASGI worker, kompatibel penuh dengan FastAPI
#      (kalau pakai gunicorn vanilla, FastAPI tidak akan jalan).
#   3. --workers 2 = cukup untuk free tier 256MB. Naikkan kalau
#      RAM lebih besar (rule of thumb: 2 * cpu + 1).
#   4. --forwarded-allow-ips=* supaya client IP terbaca lewat
#      proxy/load balancer Leapcell.
#
# PENTING: Leapcell sering pakai default template start command
# (`gunicorn --workers 1 --bind :8080 --timeout 600 your_app.wsgi`)
# yang TIDAK membaca file ini. Kalau deploy gagal dengan error
# `your_app.wsgi: not found`, BUKA dashboard Leapcell → Service
# Settings → Start Command → paste command di bawah ini secara
# manual sebagai override. Lihat DEPLOY-LEAPCELL.md langkah 4.
command = "gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 600 --forwarded-allow-ips=*"

# -----------------------------------------------------------
#  HTTP / networking
# -----------------------------------------------------------
[http]
# Leapcell akan inject $PORT, FastAPI listen ke situ.
port             = 8000
health_check_url = "/api/health"
health_check_interval_seconds = 30

# -----------------------------------------------------------
#  Resource sizing (sesuaikan via dashboard juga)
# -----------------------------------------------------------
[resources]
memory_mb = 256
cpu       = 0.5

# -----------------------------------------------------------
#  Environment variables (non-secret saja!)
#  Untuk secret, set lewat dashboard Leapcell.
# -----------------------------------------------------------
[env]
PYTHONUNBUFFERED = "1"      # log langsung flush, tidak buffered
PYTHONDONTWRITEBYTECODE = "1"

# -----------------------------------------------------------
#  Persistent storage
# -----------------------------------------------------------
# CATATAN PENTING:
# Filesystem container Leapcell EPHEMERAL — file `data/leaderboard.json`
# akan reset setiap restart/redeploy. Untuk produksi, ganti penyimpanan
# ke Leapcell Object Storage atau Database. Lihat DEPLOY-LEAPCELL.md.
